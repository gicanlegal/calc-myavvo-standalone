name: Deploy to Cloudflare Pages

on:
  push:
    branches: [bento-final]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Fix TypeScript errors
        run: |
          # Remove unused React imports (React 17+ JSX transform)
          sed -i "s/import React from 'react';//g" src/components/CalculatorDobanda.tsx
          sed -i "s/import React from 'react';//g" src/components/CalculatorPenalitate.tsx
          sed -i "s/import React from 'react';//g" src/components/CalculatorTaxa.tsx
          sed -i "s/import React from 'react';//g" src/components/CalculatorZile.tsx
          sed -i "s/import React from 'react';//g" src/components/CurrencySelector.tsx
          
          # Fix unused StepHeader import
          sed -i "s/import { StepHeader, CalcButton, RadioGroup, AddItemButton }/import { CalcButton, RadioGroup, AddItemButton }/" src/components/CalculatorZile.tsx
          
          # Fix unused X import
          sed -i "s/import { Trash2, X }/import { Trash2 }/" src/components/FormComponents.tsx
          
          # Fix unused useCallback
          sed -i "s/import { useState, useEffect, useCallback }/import { useState, useEffect }/" src/components/DatePicker.tsx
          
          # Fix unused debtCounter and payCounter
          sed -i '/debtCounter/d' src/components/CalculatorDobanda.tsx
          sed -i '/payCounter/d' src/components/CalculatorDobanda.tsx
          
          # Fix unused logoB64 in pdfExport
          sed -i 's/logoB64/_logoB64/g' src/utils/pdfExport.ts
          
          echo "TypeScript fixes applied"
      
      - name: Build
        run: npm run build
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: calc-myavvo
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
