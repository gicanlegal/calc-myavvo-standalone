<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento V5 - Soft Neumorphism</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0e5ec;
            --text: #4a5568;
            --text-light: #a0aec0;
            --primary: #3182ce;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --radius: 20px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .neu-flat {
            background: var(--bg);
            box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            border-radius: var(--radius);
        }

        .neu-pressed {
            background: var(--bg);
            box-shadow: inset 6px 6px 10px var(--shadow-dark), inset -6px -6px 10px var(--shadow-light);
            border-radius: 12px;
        }

        .bento-container {
            display: grid;
            grid-template-columns: 250px 1fr 320px;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
        }

        .card {
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar { grid-column: 1 / 2; }
        .main-inputs { grid-column: 2 / 3; }
        .results { grid-column: 3 / 4; }

        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem; color: var(--primary); text-align: center;}
        h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; color: #2d3748;}
        
        .tab {
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.2s;
        }
        .tab.active { color: var(--primary); box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .tab:not(.active):hover { color: var(--text); }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; padding-left: 0.5rem; }
        
        input, select {
            width: 100%;
            padding: 1rem;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
        }
        input:focus, select:focus { outline: none; }

        .btn {
            color: var(--primary);
            border: none;
            padding: 1.2rem;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: all 0.2s;
        }
        .btn:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }

        .result-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin: 2rem auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .result-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        .result-currency { font-size: 1rem; font-weight: 600; color: var(--text-light); }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: auto;
        }
        .stat-item { text-align: center; }
        .stat-val { font-weight: 800; font-size: 1.2rem; color: #2d3748;}
        .stat-lbl { font-size: 0.8rem; font-weight: 600; color: var(--text-light); }

        @media (max-width: 900px) {
            .bento-container { grid-template-columns: 1fr; }
            .sidebar, .main-inputs, .results { grid-column: 1 / 2; }
        }
    </style>
</head>
<body>

<div class="bento-container">
    <div class="card neu-flat sidebar">
        <h1>CalcJuridic</h1>
        
        <div style="text-align: center; margin-bottom: 2rem;" class="neu-pressed tab active">
            <div style="font-size: 0.8rem; color: var(--text-light);">Curs BNM</div>
            <div style="font-weight: 800; color: var(--text);">19.45 MDL</div>
        </div>

        <div class="tab neu-flat active">Dobândă</div>
        <div class="tab neu-flat">Penalitate</div>
        <div class="tab neu-flat">Taxă Stat</div>
    </div>

    <div class="card neu-flat main-inputs">
        <h2>Date de Calcul</h2>
        <div class="input-group">
            <label>Suma (MDL)</label>
            <input type="number" class="neu-pressed" placeholder="0.00">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="input-group">
                <label>Scadență</label>
                <input type="date" class="neu-pressed">
            </div>
            <div class="input-group">
                <label>Achitare</label>
                <input type="date" class="neu-pressed">
            </div>
        </div>
        <div class="input-group">
            <label>Tip Rata</label>
            <select class="neu-pressed">
                <option>Persoane Fizice</option>
                <option>Persoane Juridice</option>
            </select>
        </div>
        <button class="btn neu-flat" style="margin-top: 2rem;">Calculează</button>
    </div>

    <div class="card neu-flat results">
        <h2 style="text-align: center;">Rezultat Final</h2>
        
        <div class="result-circle neu-flat">
            <div class="result-value">1245<span style="font-size:1.2rem;">.50</span></div>
            <div class="result-currency">MDL</div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-val">145</div>
                <div class="stat-lbl">Zile</div>
            </div>
            <div class="stat-item">
                <div class="stat-val">5.25%</div>
                <div class="stat-lbl">Rata Medie</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
