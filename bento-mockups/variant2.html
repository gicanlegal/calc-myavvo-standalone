<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento V2 - Dark Glassmorphism</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-gradient: linear-gradient(135deg, #8b5cf6, #ec4899);
            --radius: 30px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bento-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: auto 1fr 1fr;
            gap: 1.5rem;
            max-width: 1200px;
            width: 100%;
            height: 85vh;
        }

        .bento-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: 2rem;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .bento-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        /* Layout */
        .header { grid-column: 1 / 4; grid-row: 1 / 2; flex-direction: row; justify-content: space-between; align-items: center; padding: 1.5rem 2rem;}
        .tools { grid-column: 4 / 5; grid-row: 1 / 4; }
        .main-inputs { grid-column: 1 / 3; grid-row: 2 / 4; }
        .results { grid-column: 3 / 4; grid-row: 2 / 4; background: var(--accent-gradient); border: none; }

        h1 { font-size: 1.75rem; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h2 { font-size: 1.25rem; font-weight: 500; margin-bottom: 1.5rem; }
        
        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-family: inherit;
            font-size: 1rem;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.1); }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 300;}
        .results label { color: rgba(255,255,255,0.8); }
        
        input, select {
            width: 100%;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s, background 0.3s;
        }
        input:focus { outline: none; border-color: var(--accent); background: rgba(0,0,0,0.4);}
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        .btn-glow {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(255,255,255,0.4); }

        .result-val { font-size: 3rem; font-weight: 700; line-height: 1.2; margin-top: 1rem;}
        
        @media (max-width: 900px) {
            .bento-container { display: flex; flex-direction: column; height: auto; }
        }
    </style>
</head>
<body>

<div class="bento-container">
    <div class="bento-card header">
        <h1>CalcJuridic.</h1>
        <div style="background: rgba(0,0,0,0.3); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem;">Curs BNM: 19.45</div>
    </div>

    <div class="bento-card main-inputs">
        <h2>Configurează Calculul</h2>
        <div class="input-group">
            <label>Suma Datoriei (MDL)</label>
            <input type="number" placeholder="0.00">
        </div>
        <div style="display: flex; gap: 1rem;">
            <div class="input-group" style="flex: 1;">
                <label>Data Scadenței</label>
                <input type="date">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Data Achitării</label>
                <input type="date">
            </div>
        </div>
        <div class="input-group">
            <label>Tip Rata Dobânzii</label>
            <select>
                <option>Persoane Fizice</option>
                <option>Persoane Juridice</option>
            </select>
        </div>
        <button class="btn-glow">Calculează Acum</button>
    </div>

    <div class="bento-card results">
        <label>TOTAL DOBÂNDĂ</label>
        <div class="result-val">1,245<span style="font-size: 1.5rem; font-weight: 400; opacity: 0.8;">.50 MDL</span></div>
        
        <div style="margin-top: auto; background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 20px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <span style="opacity: 0.8; font-size: 0.9rem;">Zile Întârziere</span>
                <strong>145</strong>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span style="opacity: 0.8; font-size: 0.9rem;">Rata Medie</span>
                <strong>5.25%</strong>
            </div>
        </div>
    </div>

    <div class="bento-card tools">
        <h2 style="text-align: center; margin-bottom: 2rem;">Module</h2>
        <button class="tab-btn active">Dobândă Legală</button>
        <button class="tab-btn">Penalitate</button>
        <button class="tab-btn">Taxă de Stat</button>
        <button class="tab-btn">Calculator Zile</button>
    </div>
</div>

</body>
</html>
