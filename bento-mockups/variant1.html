<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento V1 - Classic Light</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #e5e7eb;
            --radius: 24px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bento-container {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            grid-template-rows: auto 1fr;
            gap: 1.5rem;
            max-width: 1200px;
            width: 100%;
            height: 80vh;
        }

        .bento-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        /* Layout assignments */
        .header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; }
        .sidebar { grid-column: 1 / 2; grid-row: 2 / 3; }
        .main-inputs { grid-column: 2 / 3; grid-row: 2 / 3; }
        .results { grid-column: 3 / 4; grid-row: 2 / 3; background: linear-gradient(135deg, #2563eb, #1e40af); color: white; border: none; }
        .results .text-muted { color: #bfdbfe; }

        h1 { font-size: 1.5rem; font-weight: 700; }
        h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }
        
        .tab {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .tab.active { background: var(--primary); color: white; }
        .tab:not(.active):hover { background: var(--bg); }

        .input-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .results label { color: #93c5fd; }
        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--primary-hover); }

        .result-value { font-size: 2.5rem; font-weight: 700; margin: 1rem 0; }
        .result-row { display: flex; justify-content: space-between; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.2); margin-top: 1rem;}
        
        @media (max-width: 900px) {
            .bento-container { grid-template-columns: 1fr; grid-template-rows: auto; height: auto; }
            .header, .sidebar, .main-inputs, .results { grid-column: 1 / -1; grid-row: auto; }
        }
    </style>
</head>
<body>

<div class="bento-container">
    <div class="bento-card header">
        <h1>Calculator Juridic</h1>
        <div style="font-weight: 500; color: var(--text-muted);">BNM: 19.45 MDL</div>
    </div>

    <div class="bento-card sidebar">
        <h2>Instrumente</h2>
        <div class="tab active">Dobândă Legală</div>
        <div class="tab">Penalitate</div>
        <div class="tab">Taxă de Stat</div>
        <div class="tab">Zile</div>
    </div>

    <div class="bento-card main-inputs">
        <h2>Date Calcul</h2>
        <div class="input-group">
            <label>Suma Datoriei (MDL)</label>
            <input type="number" placeholder="Ex: 10000">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="input-group">
                <label>Data Scadenței</label>
                <input type="date">
            </div>
            <div class="input-group">
                <label>Data Achitării</label>
                <input type="date">
            </div>
        </div>
        <div class="input-group">
            <label>Tip Rata Dobânzii</label>
            <select>
                <option>Persoane Fizice (9%)</option>
                <option>Persoane Juridice (5%)</option>
            </select>
        </div>
        <button class="btn">Calculează</button>
    </div>

    <div class="bento-card results">
        <h2>Rezultat</h2>
        <label>Dobânda Calculată</label>
        <div class="result-value">1,245.50</div>
        <div style="font-size: 0.875rem; color: #bfdbfe;">MDL</div>
        
        <div style="margin-top: auto;">
            <div class="result-row">
                <span>Perioada</span>
                <span style="font-weight: 600;">145 zile</span>
            </div>
            <div class="result-row">
                <span>Rata BNM medie</span>
                <span style="font-weight: 600;">5.25%</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
