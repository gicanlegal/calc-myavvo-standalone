<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento V4 - Minimalist Monochrome</title>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: #e0e0e0;
            --hover: #f5f5f5;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
        }

        .bento-container {
            display: grid;
            grid-template-columns: 200px 400px 400px;
            gap: 1px;
            background-color: var(--border);
            border: 1px solid var(--border);
            max-width: 1000px;
        }

        .cell {
            background-color: var(--bg);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
        }

        .header { grid-column: 1 / 4; display: flex; justify-content: space-between; align-items: center; padding: 2rem 2.5rem;}
        .menu { grid-column: 1 / 2; }
        .form { grid-column: 2 / 3; }
        .output { grid-column: 3 / 4; }

        h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;}
        h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 2rem; }
        
        ul { list-style: none; }
        li { margin-bottom: 1rem; font-size: 1.1rem; cursor: pointer; color: #888; transition: color 0.2s; }
        li:hover { color: #000; }
        li.active { color: #000; font-weight: 500; }
        li.active::before { content: '→ '; }

        .field { margin-bottom: 2rem; }
        label { display: block; font-size: 0.8rem; margin-bottom: 0.5rem; text-transform: uppercase; color: #666; letter-spacing: 1px;}
        input, select {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--text);
            padding: 0.5rem 0;
            font-size: 1.2rem;
            font-family: inherit;
            background: transparent;
            border-radius: 0;
        }
        input:focus, select:focus { outline: none; border-bottom-width: 2px; }

        .btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 1.2rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: auto;
            transition: background 0.3s;
        }
        .btn:hover { background: #333; }

        .huge-number { font-size: 4rem; font-weight: 400; letter-spacing: -2px; margin-bottom: 0.5rem; }
        .currency { font-size: 1.2rem; color: #666; }

        .details-list { margin-top: auto; border-top: 1px solid var(--border); padding-top: 2rem; }
        .detail-item { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.9rem; }
        .detail-item span:first-child { color: #666; }

        @media (max-width: 1000px) {
            .bento-container { grid-template-columns: 1fr; gap: 1px; }
            .header, .menu, .form, .output { grid-column: 1 / 2; }
        }
    </style>
</head>
<body>

<div class="bento-container">
    <div class="cell header">
        <h1>Calculator Juridic</h1>
        <div style="font-size: 0.8rem; letter-spacing: 1px;">BNM: 19.45 MDL</div>
    </div>

    <div class="cell menu">
        <h2>Module</h2>
        <ul>
            <li class="active">Dobândă</li>
            <li>Penalitate</li>
            <li>Taxă de Stat</li>
            <li>Zile</li>
        </ul>
    </div>

    <div class="cell form">
        <h2>Parametri</h2>
        <div class="field">
            <label>Suma Datoriei</label>
            <input type="number" placeholder="0.00">
        </div>
        <div class="field">
            <label>Data Scadenței</label>
            <input type="date">
        </div>
        <div class="field">
            <label>Data Achitării</label>
            <input type="date">
        </div>
        <button class="btn">Calculare</button>
    </div>

    <div class="cell output">
        <h2>Rezultat Final</h2>
        <div class="huge-number">1,245<span style="font-size:2rem;">.50</span></div>
        <div class="currency">MDL</div>
        
        <div class="details-list">
            <div class="detail-item">
                <span>Durata calculată</span>
                <span>145 zile</span>
            </div>
            <div class="detail-item">
                <span>Rata aplicată</span>
                <span>Pers. Fizice (9%)</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
