<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento V3 - Neo-Brutalism</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdf5e6;
            --main-border: 3px solid #000;
            --shadow: 6px 6px 0px #000;
            --color-1: #ff6b6b;
            --color-2: #4ecdc4;
            --color-3: #ffe66d;
            --color-4: #ffffff;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #000;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bento-container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
        }

        .card {
            background: var(--color-4);
            border: var(--main-border);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .header { grid-column: 1 / -1; background: var(--color-3); display: flex; justify-content: space-between; align-items: center; }
        .nav { grid-column: 1 / 2; background: #fff;}
        .inputs { grid-column: 2 / 3; }
        .results { grid-column: 3 / 4; background: var(--color-2); }

        h1 { font-size: 2rem; text-transform: uppercase; letter-spacing: -1px; }
        h2 { font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: var(--main-border); padding-bottom: 0.5rem; }
        
        .nav-item {
            display: block;
            width: 100%;
            text-align: left;
            background: transparent;
            border: var(--main-border);
            padding: 1rem;
            margin-bottom: 1rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .nav-item:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0px #000; }
        .nav-item.active { background: var(--color-1); color: white; }

        label { display: block; font-weight: 600; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.8rem; }
        input, select {
            width: 100%;
            padding: 1rem;
            border: var(--main-border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            background: #fff;
        }
        input:focus, select:focus { outline: none; background: #f0f0f0; }

        .btn-calc {
            background: var(--color-1);
            color: #fff;
            border: var(--main-border);
            box-shadow: 4px 4px 0px #000;
            padding: 1rem;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-calc:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }

        .res-big { font-size: 3rem; font-weight: 700; border-bottom: var(--main-border); padding-bottom: 1rem; margin-bottom: 1rem;}
        .stat { display: flex; justify-content: space-between; font-weight: 600; font-size: 1.1rem; padding: 0.5rem 0;}

        @media (max-width: 900px) {
            .bento-container { grid-template-columns: 1fr; }
            .header, .nav, .inputs, .results { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>

<div class="bento-container">
    <div class="card header">
        <h1>CALC JURIDIC</h1>
        <div style="font-weight: 700; border: var(--main-border); padding: 0.5rem 1rem; background: #fff;">BNM: 19.45</div>
    </div>

    <div class="card nav">
        <h2 style="border-bottom: none;">Alege Modul</h2>
        <button class="nav-item active">Dobândă Legală</button>
        <button class="nav-item">Penalitate</button>
        <button class="nav-item">Taxă de Stat</button>
        <button class="nav-item">Zile</button>
    </div>

    <div class="card inputs">
        <h2>Date Intrare</h2>
        <label>Suma Datoriei (MDL)</label>
        <input type="number" placeholder="10000">
        
        <div style="display: flex; gap: 1rem;">
            <div style="flex:1;">
                <label>Data Scadenței</label>
                <input type="date">
            </div>
            <div style="flex:1;">
                <label>Data Achitării</label>
                <input type="date">
            </div>
        </div>
        
        <label>Subiect</label>
        <select>
            <option>Persoane Fizice</option>
            <option>Persoane Juridice</option>
        </select>
        
        <button class="btn-calc">Calculează</button>
    </div>

    <div class="card results">
        <h2>Total Plată</h2>
        <div class="res-big">1245.50<br><span style="font-size:1.5rem;">MDL</span></div>
        <div class="stat">
            <span>Zile:</span>
            <span>145</span>
        </div>
        <div class="stat">
            <span>Rata Medie:</span>
            <span>5.25%</span>
        </div>
    </div>
</div>

</body>
</html>
